<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Template story evento | Bar Martin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="social.css" />
</head>
<body>
  <div class="artboard story">
    <div class="logo">
      <img src="../images/logo.png" alt="Bar Martin">
      <span>Bar Martin</span>
    </div>
    <div class="badge">Trento</div>
    <div class="photo">
      <img src="../images/foto-cocktail-lilla.jpg" alt="Cocktail Bar Martin">
    </div>
    <div class="content">
      <p class="kicker">Questa sera</p>
      <h1>Cocktail night</h1>
      <p class="subtitle">Drink, musica e atmosfera calda in centro.</p>
      <div class="info-row">
        <span>Dalle 21:00</span>
        <span>@barmartintrento</span>
      </div>
      <div class="cta">Scrivici per prenotare</div>
    </div>
  </div>
</body>
</html>
