<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Template post evento | Bar Martin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="social.css" />
</head>
<body>
  <div class="artboard post" data-template="post">
    <div class="logo">
      <img src="../images/logo.png" alt="Bar Martin">
      <span>Bar Martin</span>
    </div>
    <div class="badge" data-field="badge">Via del Suffragio 51</div>
    <div class="photo">
      <img data-field="image" src="../images/foto-sala-eventi.jpg" alt="Bar Martin">
    </div>
    <div class="content">
      <p class="kicker" data-field="kicker">Evento</p>
      <h1 data-field="title">Serata al Bar Martin</h1>
      <p class="subtitle" data-field="subtitle">Cocktail, musica e sala interna nel cuore di Trento.</p>
      <div class="info-row">
        <span data-field="date">Venerdì</span>
        <span data-field="time">Dalle 21:00</span>
      </div>
      <div class="cta" data-field="cta">Prenota il tuo tavolo</div>
    </div>
  </div>
  <script src="social-content.js"></script>
  <script src="social-render.js"></script>
</body>
</html>
