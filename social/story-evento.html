<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Template story evento | Bar Martin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="social.css" />
</head>
<body>
  <div class="artboard story" data-template="story">
    <div class="logo">
      <img src="../images/logo.png" alt="Bar Martin">
      <span>Bar Martin</span>
    </div>
    <div class="badge" data-field="badge">Trento</div>
    <div class="photo">
      <img data-field="image" src="../images/foto-cocktail-lilla.jpg" alt="Bar Martin">
    </div>
    <div class="content">
      <p class="kicker" data-field="kicker">Questa sera</p>
      <h1 data-field="title">Cocktail night</h1>
      <p class="subtitle" data-field="subtitle">Drink, musica e atmosfera calda in centro.</p>
      <div class="info-row">
        <span data-field="date">Dalle 21:00</span>
        <span data-field="time">@barmartintrento</span>
      </div>
      <div class="cta" data-field="cta">Scrivici per prenotare</div>
    </div>
  </div>
  <script src="social-content.js"></script>
  <script src="social-render.js"></script>
</body>
</html>
