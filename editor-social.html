<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor social | Bar Martin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--night:#090305;--red:#cf171f;--cream:#fff0d6;--gold:#f4d9b5;--muted:#d2b892}
    *{box-sizing:border-box} body{margin:0;background:var(--night);color:var(--cream);font-family:Inter,Arial,sans-serif}
    .app{min-height:100vh;display:grid;grid-template-columns:380px 1fr;gap:22px;padding:22px}
    .panel{background:rgba(255,240,214,.08);border:1px solid rgba(255,240,214,.14);border-radius:26px;padding:20px;max-height:calc(100vh - 44px);overflow:auto}
    .toplink{color:var(--gold);font-weight:900;text-decoration:none} h1{font-size:38px;line-height:.95;margin:18px 0 8px;letter-spacing:-.06em} p{color:var(--muted);line-height:1.45}
    label{display:block;margin:14px 0 7px;color:var(--gold);font-weight:900;font-size:14px;text-transform:uppercase;letter-spacing:.06em}
    input,textarea,select{width:100%;border:1px solid rgba(255,240,214,.18);background:rgba(0,0,0,.30);color:var(--cream);border-radius:14px;padding:12px 13px;font:inherit} textarea{min-height:86px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:grid;gap:10px;margin-top:18px}.btn{border:0;border-radius:999px;padding:14px 18px;font-weight:950;background:var(--red);color:white;text-align:center;text-decoration:none;cursor:pointer}.btn.alt{background:var(--cream);color:#180607}
    .stage{min-height:calc(100vh - 44px);display:grid;place-items:center;background:linear-gradient(145deg,#171111,#050202);border:1px solid rgba(255,240,214,.10);border-radius:28px;overflow:auto;padding:28px}
    .shell.post{width:432px;height:540px}.shell.story{width:360px;height:640px}.canvas{position:relative;width:100%;height:100%;overflow:hidden;background:#090305;isolation:isolate;box-shadow:0 24px 80px rgba(0,0,0,.42)}
    .canvas:before{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,.38),rgba(0,0,0,.10) 34%,rgba(0,0,0,.86) 100%),radial-gradient(circle at 16% 12%,rgba(207,23,31,.82),transparent 33%),radial-gradient(circle at 88% 72%,rgba(207,23,31,.54),transparent 30%)}
    .canvas:after{content:"";position:absolute;inset:12px;z-index:2;border:1.4px solid rgba(255,240,214,.22);border-radius:18px;pointer-events:none}.photo{position:absolute;inset:0;z-index:0}.photo img{width:100%;height:100%;object-fit:cover;filter:saturate(1.06) contrast(1.04)}
    .logo{position:absolute;top:25px;left:25px;z-index:3;display:flex;align-items:center;gap:8px;padding:5px 9px 5px 5px;border-radius:999px;background:rgba(9,3,5,.68);border:1px solid rgba(255,240,214,.18);font-weight:950;font-size:13px}.logo img{width:31px;height:31px;border-radius:50%}
    .badge{position:absolute;top:29px;right:25px;z-index:3;padding:8px 11px;border-radius:999px;background:var(--red);font-size:12px;font-weight:950;color:white;box-shadow:0 10px 24px rgba(207,23,31,.34)}
    .content{position:absolute;left:29px;right:29px;bottom:30px;z-index:3}.kicker{display:inline-flex;margin:0 0 10px;padding:6px 8px;border-radius:999px;background:rgba(255,240,214,.13);color:var(--gold);text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:950}
    .title{margin:0;max-width:360px;font-size:47px;line-height:.88;letter-spacing:-.08em;text-wrap:balance}.subtitle{margin:13px 0 0;max-width:340px;font-size:17px;line-height:1.12;color:var(--gold);font-weight:850}.info{display:flex;flex-wrap:wrap;gap:7px;margin-top:17px}.info span{padding:7px 10px;border-radius:999px;background:rgba(9,3,5,.72);border:1px solid rgba(255,240,214,.18);font-size:12px;font-weight:950}.cta{display:inline-flex;margin-top:14px;padding:10px 14px;border-radius:999px;background:var(--cream);color:#170607;font-size:14px;font-weight:950}
    .story .logo{top:25px;left:24px}.story .badge{top:29px;right:24px}.story .content{left:26px;right:26px;bottom:45px}.story .title{font-size:46px;max-width:310px}.story .subtitle{font-size:16px}.story .canvas:after{inset:13px;border-radius:20px}
    @media(max-width:900px){.app{grid-template-columns:1fr}.panel{max-height:none}.stage{min-height:650px}.shell.post{width:330px;height:413px}.shell.story{width:300px;height:533px}.title{font-size:36px}.story .title{font-size:38px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <a class="toplink" href="index.html">← Torna al sito</a>
      <h1>Editor social</h1>
      <p>Preview live più comoda. Quando ti piace, apri la grafica a dimensione reale e fai screenshot/export.</p>
      <label>Formato</label><select id="format"><option value="post">Post 1080×1350</option><option value="story">Story 1080×1920</option></select>
      <div class="row"><div><label>Kicker</label><input id="kicker" value="Evento"></div><div><label>Badge</label><input id="badge" value="Via del Suffragio 51"></div></div>
      <label>Titolo</label><input id="title" value="Serata al Bar Martin">
      <label>Sottotitolo</label><textarea id="subtitle">Cocktail, musica e sala interna nel cuore di Trento.</textarea>
      <div class="row"><div><label>Info 1</label><input id="date" value="Venerdì"></div><div><label>Info 2</label><input id="time" value="Dalle 21:00"></div></div>
      <label>CTA</label><input id="cta" value="Prenota il tuo tavolo">
      <label>Immagine</label><select id="image"><option value="foto-sala-eventi.jpg">Sala eventi</option><option value="foto-cocktail-lilla.jpg">Cocktail lilla</option><option value="foto-aperitivo-cocktail-rossi.jpg">Aperitivo</option><option value="foto-te-iraniano.jpg">Tè iraniano</option></select>
      <div class="actions"><button class="btn" id="randomText">Proposta rapida</button><a class="btn alt" id="openLink" href="social/post-evento.html" target="_blank" rel="noopener">Apri a dimensione reale</a></div>
    </section>
    <section class="stage"><div id="shell" class="shell post"><div class="canvas"><div class="photo"><img id="pImage" src="images/foto-sala-eventi.jpg" alt=""></div><div class="logo"><img src="images/logo.png" alt=""><span>Bar Martin</span></div><div class="badge" id="pBadge"></div><div class="content"><p class="kicker" id="pKicker"></p><h2 class="title" id="pTitle"></h2><p class="subtitle" id="pSubtitle"></p><div class="info"><span id="pDate"></span><span id="pTime"></span></div><div class="cta" id="pCta"></div></div></div></div></section>
  </main>
  <script>
    const ids=['format','kicker','badge','title','subtitle','date','time','cta','image'];
    const $=id=>document.getElementById(id);
    function render(){
      const f=$('format').value, img=$('image').value;
      $('shell').className='shell '+f;
      $('pImage').src='images/'+img;
      $('pBadge').textContent=$('badge').value;
      $('pKicker').textContent=$('kicker').value;
      $('pTitle').textContent=$('title').value;
      $('pSubtitle').textContent=$('subtitle').value;
      $('pDate').textContent=$('date').value;
      $('pTime').textContent=$('time').value;
      $('pCta').textContent=$('cta').value;
      const page=f==='story'?'story-evento.html':'post-evento.html';
      const q=new URLSearchParams({kicker:$('kicker').value,title:$('title').value,subtitle:$('subtitle').value,date:$('date').value,time:$('time').value,cta:$('cta').value,badge:$('badge').value,image:'../images/'+img});
      $('openLink').href='social/'+page+'?'+q.toString();
    }
    ids.forEach(id=>{$(id).addEventListener('input',render);$(id).addEventListener('change',render)});
    $('randomText').addEventListener('click',()=>{ $('kicker').value='Questa sera'; $('title').value='Cocktail night'; $('subtitle').value='Drink, musica e atmosfera calda in centro a Trento.'; $('date').value='Stasera'; $('time').value='Dalle 21:00'; $('cta').value='Scrivici per prenotare'; $('image').value='foto-cocktail-lilla.jpg'; render(); });
    render();
  </script>
</body>
</html>
